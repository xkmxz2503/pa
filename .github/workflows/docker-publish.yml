name: docker-publish

on:
  workflow_dispatch:  # 手动触发

jobs:
  publish-dockerio:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub（Docker.io）
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送 Docker.io 镜像
        env:
          # 你的 Docker.io 仓库（无需改，默认就是 Docker 官方镜像源）
          DOCKER_REPO: xkmxz2503/pa-mcsm
          # 👉 自定义Tag（唯一需要修改的地方，填你要的名称）
          CUSTOM_TAG: v1.3-steamcmd
        run: |
          docker buildx build \
            --output "type=image,push=true" \
            --platform linux/amd64 \
            --tag ${DOCKER_REPO}:${CUSTOM_TAG} \
            --tag ${DOCKER_REPO}:latest \
            --file ./Dockerfile \
            .

      - name: 退出 Docker Hub
        if: always()
        run: docker logout    